<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>디지털 윤리 재판 게임</title>

<style>
body { font-family: sans-serif; background:#f4f6fb; padding:20px;}
.card { background:white; padding:20px; border-radius:12px; margin-bottom:20px;}
button { padding:10px 15px; margin:5px; border:none; border-radius:8px; background:#4CAF50; color:white;}
textarea { width:100%; height:80px; margin-top:10px;}
select { margin-top:10px; }
</style>
</head>

<body>

<h1>🎮 디지털 윤리 재판 게임</h1>

<div class="card">
이름: <input id="name">
<button onclick="start()">시작</button>
</div>

<div id="game"></div>

<script>

// ===== 사건 =====
const cases = [
  {
    id:1,
    title:"연예인 악플 사건",
    summary:"유명 아이돌이 악성 댓글로 활동 중단. 플랫폼이 댓글 기능 제한.",
    question:"댓글 기능 제한은 정당한가?"
  },
  {
    id:2,
    title:"가짜뉴스 확산 사건",
    summary:"SNS 허위 정보로 사회 혼란 발생. 정부가 삭제 요청.",
    question:"정부의 삭제 요청은 정당한가?"
  },
  {
    id:3,
    title:"AI 저작권 논란",
    summary:"AI 이미지 상업적 판매 논란 발생.",
    question:"이 행위는 정당한가?"
  }
];

const principles = ["인간 존중", "정의", "해악 금지", "책임"];

// ===== 상태 =====
let state = {
  name:"",
  step:0,
  answers:{}
};

function start(){
  state.name = document.getElementById("name").value;
  if(!state.name) return alert("이름 입력!");
  render();
}

function currentCase(){
  return cases[state.step];
}

// ===== 화면 =====
function render(){

  const c = currentCase();
  const saved = state.answers[c.id] || {
    stance:"",
    reason:"",
    rebuttal:"",
    principle:""
  };

  document.getElementById("game").innerHTML = `
    <div class="card">
      <h2>${c.title}</h2>
      <p>${c.summary}</p>
      <h3>${c.question}</h3>

      <b>① 입장 선택</b><br>
      <select onchange="update('stance', this.value)">
        <option value="">선택</option>
        <option value="찬성" ${saved.stance==="찬성"?"selected":""}>찬성</option>
        <option value="반대" ${saved.stance==="반대"?"selected":""}>반대</option>
      </select>

      <br><br>

      <b>② 근거 작성</b>
      <textarea
        placeholder="왜 그렇게 생각하는지 작성 (피해, 권리, 책임 등 포함하면 좋음)"
        oninput="update('reason', this.value)"
      >${saved.reason}</textarea>

      <br>

      <b>③ 반박 작성</b>
      <textarea
        placeholder="반대 입장에 대한 반박"
        oninput="update('rebuttal', this.value)"
      >${saved.rebuttal}</textarea>

      <br>

      <b>④ 도덕 원칙 선택</b><br>
      ${principles.map(p=>`
        <button onclick="update('principle','${p}')"
        style="background:${saved.principle===p?'orange':'#4CAF50'}">
        ${p}
        </button>
      `).join("")}

      <br><br>

      <button onclick="next()">다음</button>
    </div>
  `;
}

// ===== 입력 저장 (🔥 버그 해결 핵심) =====
function update(field, value){
  const c = currentCase();
  const prev = state.answers[c.id] || {
    stance:"",
    reason:"",
    rebuttal:"",
    principle:""
  };

  state.answers[c.id] = {
    ...prev,
    [field]: value
  };
}

// ===== 점수 =====
function calcScore(text, principle){
  let s=0;
  if(text.length>10) s+=20;
  if(text.length>25) s+=20;
  if(text.includes("피해") || text.includes("권리")) s+=20;
  if(text.includes(principle)) s+=40;
  return Math.min(s,100);
}

// ===== 다음 =====
function next(){

  const c = currentCase();
  const a = state.answers[c.id];

  if(!a || !a.reason || !a.rebuttal || !a.stance){
    alert("모든 항목 작성!");
    return;
  }

  if(state.step < cases.length-1){
    state.step++;
    render();
  } else {
    finish();
  }
}

// ===== 결과 =====
function finish(){

  let total = 0;
  let html = "<div class='card'><h2>🏆 결과</h2>";

  Object.keys(state.answers).forEach(id=>{
    const a = state.answers[id];
    const s = calcScore(a.reason, a.principle);
    total += s;

    html += `
      <hr>
      <b>사건 ${id}</b><br>
      입장: ${a.stance}<br>
      근거: ${a.reason}<br>
      반박: ${a.rebuttal}<br>
      원칙: ${a.principle}<br>
      점수: ${s}<br>
    `;
  });

  html += `<h3>총점: ${total}</h3>`;

  html += "<h3>📄 수행평가 문장</h3>";

  Object.values(state.answers).forEach(a=>{
    html += `<p>나는 ${a.stance}이다. 이유는 ${a.reason}이며 이는 ${a.principle} 원칙과 관련 있다.</p>`;
  });

  html += "</div>";

  document.getElementById("game").innerHTML = html;
}

</script>

</body>
</html>
