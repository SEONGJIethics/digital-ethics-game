<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>디지털 윤리 게임</title>
<style>
body { font-family: sans-serif; padding:20px; background:#f5f7fb;}
.card { background:white; padding:20px; border-radius:12px; margin-bottom:20px;}
button { padding:10px 15px; border:none; border-radius:8px; background:#4CAF50; color:white;}
textarea { width:100%; height:80px; margin-top:10px;}
.rank { background:#eee; padding:10px; border-radius:10px; margin:5px 0;}
</style>
</head>

<body>

<h1>🎮 디지털 윤리 게임</h1>

<div class="card">
  이름: <input id="name">
  <button onclick="start()">시작</button>
</div>

<div id="game"></div>

<div id="ranking" class="card"></div>

<script>

let state = {
  name:"",
  caseIndex:0,
  answers:{},
  scores:[],
  allAnswers: {} // 🔥 교사용 전체 답변 저장
};

const cases = [
  {
    id:1,
    text:"🔥 사건1: SNS에서 친구를 비난하는 글이 퍼졌다."
  },
  {
    id:2,
    text:"🔥 사건2: 유명인의 루머가 단톡방에서 공유되고 있다."
  }
];

function start(){
  state.name = document.getElementById("name").value;
  if(!state.name) return alert("이름 입력!");
  render();
}

function render(){
  const c = cases[state.caseIndex];
  const saved = state.answers[c.id] || { stance:"", reason:"" };

  document.getElementById("game").innerHTML = `
    <div class="card">
      <h3>${c.text}</h3>

      <select onchange="updateAnswer('stance', this.value)">
        <option value="">선택</option>
        <option value="찬성">찬성</option>
        <option value="반대">반대</option>
      </select>

      <textarea placeholder="이유 작성"
        oninput="updateAnswer('reason', this.value)"
      >${saved.reason}</textarea>

      <br><br>
      <button onclick="next()">다음</button>
    </div>
  `;
}

function updateAnswer(field, value){
  const c = cases[state.caseIndex];
  const prev = state.answers[c.id] || { stance:"", reason:"" };

  state.answers[c.id] = { ...prev, [field]: value };

  // 🔥 교사용 전체 답변 저장
  if(!state.allAnswers[c.id]) state.allAnswers[c.id] = [];
}

function next(){
  const c = cases[state.caseIndex];
  const answer = state.answers[c.id];

  if(!answer || !answer.reason){
    alert("작성하세요!");
    return;
  }

  // 🔥 답변 저장
  state.allAnswers[c.id].push({
    name: state.name,
    answer: answer.reason
  });

  if(state.caseIndex < cases.length -1){
    showBestAnswers(c.id);
    state.caseIndex++;
    render();
  } else {
    finish();
  }
}

function showBestAnswers(caseId){
  const arr = state.allAnswers[caseId];

  let html = `<div class="card"><h3>👍 좋은 답변 예시</h3>`;

  arr.slice(-3).forEach(a=>{
    html += `<div class="rank">${a.name}: ${a.answer}</div>`;
  });

  html += `<button onclick="render()">다음 사건</button></div>`;

  document.getElementById("game").innerHTML = html;
}

function finish(){

  let score = Math.floor(Math.random()*100)+100;

  state.scores.push({
    name: state.name,
    score
  });

  renderRanking();
}

function renderRanking(){

  let sorted = [...state.scores].sort((a,b)=>b.score-a.score);

  let html = "<h3>🏆 랭킹</h3>";

  sorted.forEach((s,i)=>{
    html += `<div class="rank">${i+1}위 ${s.name} - ${s.score}점</div>`;
  });

  document.getElementById("ranking").innerHTML = html;

  // 🔥 교사용 전체 답변 콘솔 출력
  console.log("전체 답변:", state.allAnswers);
}

</script>

</body>
</html>
