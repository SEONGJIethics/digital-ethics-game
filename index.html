<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>디지털 윤리 재판 게임</title>

<style>
body { font-family: sans-serif; background:#f4f6fb; padding:20px;}
.card { background:white; padding:20px; border-radius:12px; margin-bottom:20px;}
button { padding:10px 15px; border:none; border-radius:8px; background:#4CAF50; color:white;}
textarea { width:100%; height:80px; margin-top:10px;}
select { margin-top:10px; }
</style>
</head>

<body>

<h1>⚖️ 디지털 윤리 재판 게임</h1>

<div class="card">
이름: <input id="name">
<button onclick="start()">시작</button>
</div>

<div id="game"></div>

<script>

let state = {
  name:"",
  caseIndex:0,
  answers:{}
};

const cases = [
  {
    id:1,
    text:"🔥 사건1: SNS에서 특정 학생을 비난하는 글이 퍼지고 있다."
  },
  {
    id:2,
    text:"🔥 사건2: 단톡방에서 확인되지 않은 연예인 루머가 공유되고 있다."
  }
];

function start(){
  state.name = document.getElementById("name").value;
  if(!state.name) return alert("이름 입력!");
  render();
}

function currentCase(){
  return cases[state.caseIndex];
}

function render(){

  const c = currentCase();
  const saved = state.answers[c.id] || {
    stance:"",
    reason:"",
    rebuttal:""
  };

  document.getElementById("game").innerHTML = `
    <div class="card">
      <h3>${c.text}</h3>

      <b>① 입장 선택</b><br>
      <select onchange="updateAnswer('stance', this.value)">
        <option value="">선택</option>
        <option value="찬성" ${saved.stance==="찬성"?"selected":""}>찬성</option>
        <option value="반대" ${saved.stance==="반대"?"selected":""}>반대</option>
      </select>

      <br><br>

      <b>② 근거 작성</b>
      <textarea
        placeholder="왜 그렇게 생각하는지 작성"
        oninput="updateAnswer('reason', this.value)"
      >${saved.reason}</textarea>

      <br>

      <b>③ 반대 입장 반박</b>
      <textarea
        placeholder="반대 의견에 대한 반박"
        oninput="updateAnswer('rebuttal', this.value)"
      >${saved.rebuttal}</textarea>

      <br><br>

      <button onclick="next()">다음</button>
    </div>
  `;
}

/* 🔥 핵심 수정: render 제거 */
function updateAnswer(field, value){
  const c = currentCase();
  const prev = state.answers[c.id] || {
    stance:"",
    reason:"",
    rebuttal:""
  };

  state.answers[c.id] = {
    ...prev,
    [field]: value
  };
}

function next(){

  const c = currentCase();
  const answer = state.answers[c.id];

  if(!answer || !answer.reason || !answer.rebuttal){
    alert("모든 항목 작성!");
    return;
  }

  if(state.caseIndex < cases.length -1){
    state.caseIndex++;
    render();
  } else {
    finish();
  }
}

function finish(){

  let html = "<div class='card'><h2>✅ 완료!</h2>";

  Object.keys(state.answers).forEach(id=>{
    const a = state.answers[id];
    html += `
      <hr>
      <b>사건 ${id}</b><br>
      입장: ${a.stance}<br>
      근거: ${a.reason}<br>
      반박: ${a.rebuttal}<br>
    `;
  });

  html += "</div>";

  document.getElementById("game").innerHTML = html;
}

</script>

</body>
</html>
